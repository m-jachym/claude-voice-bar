name: ClaudeVoiceBar
options:
  bundleIdPrefix: com.marekjachym
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"

targets:
  ClaudeVoiceBar:
    type: application
    platform: macOS
    sources:
      - Sources
      - Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: ClaudeVoiceBar
        INFOPLIST_KEY_CFBundleDisplayName: "Claude Voice Bar"
        PRODUCT_BUNDLE_IDENTIFIER: com.marekjachym.ClaudeVoiceBar
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: ClaudeVoiceBar.entitlements
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "3"
        LSApplicationCategoryType: "public.app-category.utilities"
    entitlements:
      path: ClaudeVoiceBar.entitlements
      properties:
        com.apple.security.device.audio-input: true
